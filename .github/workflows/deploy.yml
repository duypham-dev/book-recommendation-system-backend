# .github/workflows/deploy.yml
name: CI / Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint + Test
  # Chạy trên mọi push lên main. Deploy chỉ được kích hoạt nếu job này pass.
  # ─────────────────────────────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRECT: ci-access-secret-at-least-32-characters-long
      JWT_REFRESH_SECRECT: ci-refresh-secret-at-least-32-characters-long
      FRONTEND_URL: http://localhost:5173
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      REDIS_PASSWORD: test-redis-pass
      RABBITMQ_URL: amqp://guest:guest@localhost:5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: test-key
      CLOUDINARY_API_SECRET: test-secret
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: test-bucket
      RECOMMENDATION_SERVICE_URL: http://localhost:8003
      RESEND_API_KEY: test-resend-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npx vitest run

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy
  # Chỉ chạy sau khi job ci PASS. Nếu test fail → deploy bị block.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci                  # ← phụ thuộc vào job ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /var/www/backend
            git pull origin main
            docker compose up -d --build backend worker-email worker-cache
            docker compose run --rm migrate
            docker image prune -f
            docker compose restart nginx
